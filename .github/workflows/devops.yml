name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set Up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies (Auth Service)
        if: always()
        run: npm ci
        working-directory: ./auth-service

      - name: Install Dependencies (Product Service)
        if: always()
        run: npm ci
        working-directory: ./product-service

      - name: Install Dependencies (Order Service)
        if: always()
        run: npm ci
        working-directory: ./order-service

      - name: Install Dependencies (Payment Service)
        if: always()
        run: npm ci
        working-directory: ./payment-service

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Run Tests (Auth Service)
        run: npm test
        working-directory: ./auth-service

      - name: Run Tests (Product Service)
        run: npm test
        working-directory: ./product-service

      - name: Run Tests (Order Service)
        run: npm test
        working-directory: ./order-service

      - name: Run Tests (Payment Service)
        run: npm test
        working-directory: ./payment-service

  docker-build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and Push Auth Service
        run: |
          docker build -t xblondon/auth-service:latest ./auth-service
          docker tag xblondon/auth-service:latest xblondon/auth-service:${{ github.sha }}
          docker push xblondon/auth-service:latest
          docker push xblondon/auth-service:${{ github.sha }}

      - name: Build and Push Product Service
        run: |
          docker build -t xblondon/product-service:latest ./product-service
          docker tag xblondon/product-service:latest xblondon/product-service:${{ github.sha }}
          docker push xblondon/product-service:latest
          docker push xblondon/product-service:${{ github.sha }}

      - name: Build and Push Order Service
        run: |
          docker build -t xblondon/order-service:latest ./order-service
          docker tag xblondon/order-service:latest xblondon/order-service:${{ github.sha }}
          docker push xblondon/order-service:latest
          docker push xblondon/order-service:${{ github.sha }}

      - name: Build and Push Payment Service
        run: |
          docker build -t xblondon/payment-service:latest ./payment-service
          docker tag xblondon/payment-service:latest xblondon/payment-service:${{ github.sha }}
          docker push xblondon/payment-service:latest
          docker push xblondon/payment-service:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull xblondon/auth-service:latest
            docker pull xblondon/product-service:latest
            docker pull xblondon/order-service:latest
            docker pull xblondon/payment-service:latest
            docker-compose up -d
